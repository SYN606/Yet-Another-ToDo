{% load static %}

<!-- Footer -->
<footer
  class="mt-12 border-t border-zinc-200/60 bg-white/60 py-6 backdrop-blur-xl dark:border-zinc-800 dark:bg-zinc-950/50 sm:mt-16 sm:py-8"
>
  <div
    class="mx-auto flex max-w-7xl flex-col items-center justify-between gap-6 px-4 text-center text-sm text-zinc-500 sm:px-6 md:flex-row md:text-left lg:px-8 dark:text-zinc-400"
  >
    <!-- Left -->
    <div>
      <p class="font-medium text-zinc-700 dark:text-zinc-300">
        &copy; {{ now.year }} Yet Another ToDo
      </p>

      <p class="mt-1 text-xs sm:text-sm">Built with Django + Tailwind CSS ✨</p>

      <!-- Developer -->
      <div
        class="mt-3 flex flex-col items-center gap-1 text-xs sm:text-sm md:items-start"
      >
        <a
          href="https://syn606.pages.dev"
          target="_blank"
          class="flex items-center gap-2 transition hover:text-primary"
        >
          <i class="fas fa-code text-primary"></i>
          Developed by Syn
        </a>

        <a
          href="https://github.com/syn606"
          target="_blank"
          class="flex items-center gap-2 transition hover:text-primary"
        >
          <i class="fab fa-github"></i>
          github.com/syn606
        </a>
      </div>
    </div>

    <!-- Socials -->
    <div class="flex items-center gap-5 text-xl">
      <a
        href="https://github.com/syn606"
        target="_blank"
        class="transition hover:scale-110 hover:text-primary"
      >
        <i class="fab fa-github"></i>
      </a>

      <a
        href="https://syn606.pages.dev"
        target="_blank"
        class="transition hover:scale-110 hover:text-primary"
      >
        <i class="fas fa-globe"></i>
      </a>

      <a href="#" class="transition hover:scale-110 hover:text-primary">
        <i class="fab fa-discord"></i>
      </a>
    </div>

</footer>
